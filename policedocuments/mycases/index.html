<!DOCTYPE html>
<html>
<head>
  <title>Police Case Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h2>🚔 Case Dashboard</h2>

<input type="text" id="search" placeholder="Search FIR / Name...">

<table id="caseTable">
  <thead></thead>
  <tbody></tbody>
</table>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQEAWS00EGr4y_37Di53_1O2xhG3f-qEOp0t7i3UHhDMYTR6Qr_nrKjOM-7ZE2FidNhAdfksesIjdh-/pub?output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").map(r => r.split(","));

    let thead = "<tr>";
    rows[0].forEach(col => thead += `<th>${col}</th>`);
    thead += "</tr>";
    document.querySelector("#caseTable thead").innerHTML = thead;

    let tbody = "";
    for (let i = 1; i < rows.length; i++) {
      tbody += "<tr>";
      rows[i].forEach(cell => {
        tbody += `<td>${cell}</td>`;
      });
      tbody += "</tr>";
    }

    document.querySelector("#caseTable tbody").innerHTML = tbody;
  });

// SEARCH FUNCTION
document.getElementById("search").addEventListener("keyup", function() {
  let filter = this.value.toLowerCase();
  let rows = document.querySelectorAll("#caseTable tbody tr");

  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});
</script>

</body>
</html>
