<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FIR/CSR Case Management System | Police Records</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.5s ease;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: white;
            color: #1e3c72;
            border-color: white;
        }
        
        .form-container, .cases-container {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
            animation: fadeInUp 0.5s ease;
        }
        
        .form-container.active, .cases-container.active {
            display: block;
        }
        
        .form-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #1e3c72;
        }
        
        .info-box {
            background: linear-gradient(135deg, #1e3c7215 0%, #2a529815 100%);
            border-left: 4px solid #1e3c72;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            font-size: 14px;
            color: #555;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 5px;
        }
        
        .full-width {
            grid-column: span 3;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }
        
        .cases-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .refresh-btn {
            background: #1e3c72;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #2a5298;
            transform: translateY(-1px);
        }
        
        .cases-table {
            overflow-x: auto;
            border-radius: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th {
            background: #1e3c72;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        
        .message {
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
        }
        
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .case-id {
            font-family: monospace;
            font-weight: 600;
            color: #1e3c72;
        }
        
        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Responsive Design */
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .full-width {
                grid-column: span 2;
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .form-container, .cases-container {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .full-width {
                grid-column: span 1;
            }
            
            .tabs {
                gap: 10px;
            }
            
            .tab-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            th, td {
                font-size: 11px;
                padding: 8px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
        }
        
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #1e3c72;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #2a5298;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 FIR/CSR Case Management System</h1>
            <p>Register, track, and manage all police cases in one place</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('register')">➕ Register New FIR/CSR</button>
            <button class="tab-btn" onclick="switchTab('view')">📊 View All Cases</button>
        </div>
        
        <!-- Registration Form -->
        <div id="registerForm" class="form-container active">
            <h2 class="form-title">Register New FIR/CSR</h2>
            
            <div class="info-box">
                💡 <strong>Information:</strong> All data will be saved to your Google Sheet. Case number is auto-generated if left blank.
            </div>
            
            <div id="registerMessage" class="message"></div>
            
            <form id="caseForm" onsubmit="return false;">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="required">FIR/CSR Type</label>
                        <select id="firCsr" required>
                            <option value="FIR">FIR (First Information Report)</option>
                            <option value="CSR">CSR (Community Service Register)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Police Station</label>
                        <input type="text" id="station" required placeholder="Enter police station name">
                    </div>
                    
                    <div class="form-group">
                        <label>Case Number</label>
                        <input type="text" id="number" placeholder="Leave blank for auto-generation">
                    </div>
                    
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="year" placeholder="YYYY" value="2026">
                    </div>
                    
                    <div class="form-group">
                        <label>Sections (IPC/BNS)</label>
                        <input type="text" id="sections" placeholder="e.g., 302, 341, 354">
                    </div>
                    
                    <div class="form-group">
                        <label>Date of Occurrence (DO)</label>
                        <input type="date" id="doDate">
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Complainant Name</label>
                        <input type="text" id="complainant" required placeholder="Full name of complainant">
                    </div>
                    
                    <div class="form-group">
                        <label>Accused Name(s)</label>
                        <input type="text" id="accused" placeholder="Name(s) of accused persons">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>FIR Contents / Case Details</label>
                        <textarea id="firContents" placeholder="Detailed description of the incident..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Accused Photo (URL/Reference)</label>
                        <input type="text" id="accusedPhoto" placeholder="Link to photo or reference">
                    </div>
                    
                    <div class="form-group">
                        <label>Accused ID Proof (URL/Reference)</label>
                        <input type="text" id="accusedIdProof" placeholder="Link to ID proof or reference">
                    </div>
                    
                    <div class="form-group">
                        <label>Property Seized</label>
                        <textarea id="propertySeized" rows="2" placeholder="List of seized properties..."></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" onclick="registerCase()">
                    🚀 Register FIR/CSR
                </button>
            </form>
        </div>
        
        <!-- View Cases -->
        <div id="viewCases" class="cases-container">
            <div class="cases-header">
                <h2 class="form-title" style="border-bottom: none; margin-bottom: 0;">📋 All Registered Cases</h2>
                <button class="refresh-btn" onclick="loadCases()">🔄 Refresh</button>
            </div>
            
            <div id="statsContainer" class="stats-grid"></div>
            
            <div class="cases-table" id="casesList">
                <div class="loading">⏳ Loading cases...</div>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION - Web App URL
        // ============================================
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwesHKAF5m6yJl6KQXRAs8JdCCK6LTOf_bP3ENMjITCuPL0WNwxxwfESm_OaOA_whX5/exec';
        
        let currentTab = 'register';
        
        // Switch between tabs
        function switchTab(tab) {
            currentTab = tab;
            const registerForm = document.getElementById('registerForm');
            const viewCases = document.getElementById('viewCases');
            const tabs = document.querySelectorAll('.tab-btn');
            
            tabs.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'register') {
                registerForm.classList.add('active');
                viewCases.classList.remove('active');
                tabs[0].classList.add('active');
            } else {
                registerForm.classList.remove('active');
                viewCases.classList.add('active');
                tabs[1].classList.add('active');
                loadCases();
            }
        }
        
        // Register new case
        async function registerCase() {
            // Get form values
            const caseData = {
                firCsr: document.getElementById('firCsr').value,
                station: document.getElementById('station').value.trim(),
                number: document.getElementById('number').value.trim(),
                year: document.getElementById('year').value,
                sections: document.getElementById('sections').value.trim(),
                doDate: document.getElementById('doDate').value,
                complainant: document.getElementById('complainant').value.trim(),
                accused: document.getElementById('accused').value.trim(),
                firContents: document.getElementById('firContents').value.trim(),
                accusedPhoto: document.getElementById('accusedPhoto').value.trim(),
                accusedIdProof: document.getElementById('accusedIdProof').value.trim(),
                propertySeized: document.getElementById('propertySeized').value.trim()
            };
            
            // Validation
            if (!caseData.station) {
                showMessage('registerMessage', '❌ Please enter police station name', 'error');
                return;
            }
            if (!caseData.complainant) {
                showMessage('registerMessage', '❌ Please enter complainant name', 'error');
                return;
            }
            
            const submitBtn = event.target;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Registering...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(caseData)
                });
                
                // Reset form
                document.getElementById('caseForm').reset();
                document.getElementById('year').value = '2026';
                document.getElementById('firCsr').value = 'FIR';
                
                showMessage('registerMessage', '✅ FIR/CSR registered successfully! Data saved to Google Sheet.', 'success');
                
                // If on view tab, refresh the cases
                if (currentTab === 'view') {
                    setTimeout(() => {
                        loadCases();
                    }, 1000);
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('registerMessage', '❌ Error registering case. Please check your connection and try again.', 'error');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        }
        
        // Load all cases
        async function loadCases() {
            const casesDiv = document.getElementById('casesList');
            casesDiv.innerHTML = '<div class="loading">⏳ Loading cases...</div>';
            
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                if (data.success && data.cases && data.cases.length > 0) {
                    displayStats(data.cases);
                    displayCases(data.cases);
                } else {
                    casesDiv.innerHTML = '<div class="empty-state">📭 No FIR/CSR cases registered yet. Click "Register New FIR/CSR" to get started!</div>';
                    document.getElementById('statsContainer').innerHTML = '';
                }
            } catch (error) {
                console.error('Error:', error);
                casesDiv.innerHTML = '<div class="empty-state">❌ Error loading cases. Please check your connection and ensure the Google Apps Script is deployed correctly.</div>';
            }
        }
        
        // Display statistics
        function displayStats(cases) {
            const statsDiv = document.getElementById('statsContainer');
            const totalCases = cases.length;
            const firCases = cases.filter(c => c.firCsr === 'FIR').length;
            const csrCases = cases.filter(c => c.firCsr === 'CSR').length;
            const currentYear = new Date().getFullYear();
            const thisYearCases = cases.filter(c => parseInt(c.year) === currentYear).length;
            
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalCases}</div>
                    <div class="stat-label">Total Cases</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${firCases}</div>
                    <div class="stat-label">FIR Cases</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${csrCases}</div>
                    <div class="stat-label">CSR Cases</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${thisYearCases}</div>
                    <div class="stat-label">This Year</div>
                </div>
            `;
        }
        
        // Display cases in table
        function displayCases(cases) {
            const casesDiv = document.getElementById('casesList');
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>FIR/CSR</th>
                            <th>Station</th>
                            <th>Number</th>
                            <th>Year</th>
                            <th>Sections</th>
                            <th>DO</th>
                            <th>DR</th>
                            <th>Complainant</th>
                            <th>Accused</th>
                            <th>FIR Contents</th>
                            <th>Property Seized</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            cases.forEach(c => {
                const doDate = c.doDate ? new Date(c.doDate).toLocaleDateString('en-IN') : 'N/A';
                const drDate = c.drDate ? new Date(c.drDate).toLocaleDateString('en-IN') : 'N/A';
                const firCsrClass = c.firCsr === 'FIR' ? 'status-badge' : 'status-badge';
                
                html += `
                    <tr>
                        <td><strong>${escapeHtml(c.firCsr)}</strong></td>
                        <td>${escapeHtml(c.station)}</td>
                        <td class="case-id">${escapeHtml(c.number)}</td>
                        <td>${escapeHtml(c.year)}</td>
                        <td>${escapeHtml(c.sections)}</td>
                        <td>${doDate}</td>
                        <td>${drDate}</td>
                        <td>${escapeHtml(c.complainant)}</td>
                        <td>${escapeHtml(c.accused)}</td>
                        <td>${escapeHtml(c.firContents || '').substring(0, 100)}${c.firContents && c.firContents.length > 100 ? '...' : ''}</td>
                        <td>${escapeHtml(c.propertySeized || '').substring(0, 80)}${c.propertySeized && c.propertySeized.length > 80 ? '...' : ''}</td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            casesDiv.innerHTML = html;
        }
        
        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Show message
        function showMessage(elementId, message, type) {
            const messageDiv = document.getElementById(elementId);
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // Add enter key support for form
        document.getElementById('caseForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                registerCase();
            }
        });
        
        // Auto-load cases if view tab is active on page load
        window.addEventListener('load', () => {
            if (document.getElementById('viewCases').classList.contains('active')) {
                loadCases();
            }
        });
    </script>
</body>
</html>
