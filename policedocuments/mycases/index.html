<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        
        .form-container, .cases-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .form-container.active, .cases-container.active {
            display: block;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
        }
        
        .cases-table {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-new { background: #e3f2fd; color: #1976d2; }
        .status-in-progress { background: #fff3e0; color: #f57c00; }
        .status-resolved { background: #e8f5e9; color: #388e3c; }
        .status-closed { background: #f5f5f5; color: #757575; }
        
        .priority-high { color: #d32f2f; font-weight: 600; }
        .priority-medium { color: #f57c00; }
        .priority-low { color: #388e3c; }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .full-width {
                grid-column: span 1;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Case Management System</h1>
            <p>Register and track cases efficiently</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('register')">➕ Register New Case</button>
            <button class="tab-btn" onclick="switchTab('view')">📊 View All Cases</button>
        </div>
        
        <!-- Register Case Form -->
        <div id="registerForm" class="form-container active">
            <h2>Register New Case</h2>
            
            <div class="info-box">
                <strong>📝 Note:</strong> Priority and Description will be stored in columns 7 and 8 respectively.
            </div>
            
            <div id="registerMessage" class="message"></div>
            
            <form id="caseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>1. Case Title *</label>
                        <input type="text" id="caseTitle" required placeholder="Enter case title">
                    </div>
                    
                    <div class="form-group">
                        <label>2. Client Name *</label>
                        <input type="text" id="clientName" required placeholder="Enter client name">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>3. Case Type *</label>
                        <select id="caseType" required>
                            <option value="">Select Case Type</option>
                            <option value="Civil">Civil</option>
                            <option value="Criminal">Criminal</option>
                            <option value="Corporate">Corporate</option>
                            <option value="Family">Family</option>
                            <option value="Property">Property</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>4. Priority (Stored in Column G/7)</label>
                        <select id="priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option value="New">New</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Resolved">Resolved</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Assigned To</label>
                        <input type="text" id="assignedTo" placeholder="Name of assigned person">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>5. Description (Stored in Column H/8)</label>
                    <textarea id="description" placeholder="Enter case details..."></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Register Case</button>
            </form>
        </div>
        
        <!-- View Cases -->
        <div id="viewCases" class="cases-container">
            <h2>All Registered Cases</h2>
            <div class="cases-table" id="casesList">
                <div class="loading">Loading cases...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Replace with your Google Apps Script Web App URL
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwesHKAF5m6yJl6KQXRAs8JdCCK6LTOf_bP3ENMjITCuPL0WNwxxwfESm_OaOA_whX5/exec';
        
        // Switch between tabs
        function switchTab(tab) {
            const registerForm = document.getElementById('registerForm');
            const viewCases = document.getElementById('viewCases');
            const tabs = document.querySelectorAll('.tab-btn');
            
            tabs.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'register') {
                registerForm.classList.add('active');
                viewCases.classList.remove('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                registerForm.classList.remove('active');
                viewCases.classList.add('active');
                document.querySelector('.tab-btn:last-child').classList.add('active');
                loadCases();
            }
        }
        
        // Register new case
        document.getElementById('caseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const caseData = {
                caseTitle: document.getElementById('caseTitle').value,
                clientName: document.getElementById('clientName').value,
                caseType: document.getElementById('caseType').value,
                priority: document.getElementById('priority').value,
                description: document.getElementById('description').value,
                status: document.getElementById('status').value,
                assignedTo: document.getElementById('assignedTo').value
            };
            
            const messageDiv = document.getElementById('registerMessage');
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(caseData)
                });
                
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                messageDiv.textContent = '✅ Case registered successfully! Priority and Description saved in columns 7 & 8.';
                
                // Reset form
                document.getElementById('caseForm').reset();
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.textContent = '❌ Error registering case. Please try again.';
                console.error('Error:', error);
            }
        });
        
        // Load all cases
        async function loadCases() {
            const casesDiv = document.getElementById('casesList');
            casesDiv.innerHTML = '<div class="loading">Loading cases...</div>';
            
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                if (data.cases && data.cases.length > 0) {
                    displayCases(data.cases);
                } else {
                    casesDiv.innerHTML = '<p>No cases registered yet.</p>';
                }
            } catch (error) {
                casesDiv.innerHTML = '<p class="error">Error loading cases. Please check your connection.</p>';
                console.error('Error:', error);
            }
        }
        
        // Display cases in table
        function displayCases(cases) {
            const casesDiv = document.getElementById('casesList');
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Case ID</th>
                            <th>Date</th>
                            <th>Case Title</th>
                            <th>Client</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Priority (Col 7)</th>
                            <th>Description (Col 8)</th>
                            <th>Assigned To</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            cases.forEach(caseItem => {
                const statusClass = getStatusClass(caseItem.status);
                const priorityClass = `priority-${caseItem.priority.toLowerCase()}`;
                const date = caseItem.dateRegistered ? new Date(caseItem.dateRegistered).toLocaleDateString() : 'N/A';
                
                html += `
                    <tr>
                        <td>${caseItem.caseId || 'N/A'}</td>
                        <td>${date}</td>
                        <td><strong>${caseItem.caseTitle || 'N/A'}</strong></td>
                        <td>${caseItem.clientName || 'N/A'}</td>
                        <td>${caseItem.caseType || 'N/A'}</td>
                        <td><span class="status-badge ${statusClass}">${caseItem.status || 'N/A'}</span></td>
                        <td class="${priorityClass}">${caseItem.priority || 'N/A'}</td>
                        <td>${caseItem.description || 'N/A'}</td>
                        <td>${caseItem.assignedTo || 'N/A'}</td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            casesDiv.innerHTML = html;
        }
        
        function getStatusClass(status) {
            const statusMap = {
                'New': 'status-new',
                'In Progress': 'status-in-progress',
                'Resolved': 'status-resolved',
                'Closed': 'status-closed'
            };
            return statusMap[status] || 'status-new';
        }
        
        // Load cases when page loads if view tab is active
        window.addEventListener('load', () => {
            if (document.getElementById('viewCases').classList.contains('active')) {
                loadCases();
            }
        });
    </script>
</body>
</html>
