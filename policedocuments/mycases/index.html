<!DOCTYPE html>
<html>
<head>
  <title>Police Case Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    form {
      background: white;
      padding: 15px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #2c3e50;
      color: white;
      padding: 12px;
      border: none;
      width: 100%;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #34495e;
    }

    #statusMsg {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🚔 Police Case Entry</h2>

<form id="caseForm">

  <input type="text" name="fir_no" placeholder="FIR Number" required>

  <input type="date" name="date" required>

  <input type="text" name="name" placeholder="Complainant Name">

  <input type="text" name="accused" placeholder="Accused Name">

  <select name="type">
    <option>Theft</option>
    <option>Missing</option>
    <option>Accident</option>
    <option>Other</option>
  </select>

  <input type="text" name="section" placeholder="Section of Law">

  <select name="status">
    <option>Open</option>
    <option>Under Investigation</option>
    <option>Closed</option>
  </select>

  <select name="priority">
    <option>Normal</option>
    <option>Urgent</option>
  </select>

  <textarea name="remarks" placeholder="Remarks"></textarea>

  <!-- 📷 IMAGE UPLOAD -->
  <input type="file" id="imageInput" accept="image/*">

  <button type="submit">Submit Case</button>

  <div id="statusMsg"></div>

</form>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwesHKAF5m6yJl6KQXRAs8JdCCK6LTOf_bP3ENMjITCuPL0WNwxxwfESm_OaOA_whX5/exec";

document.getElementById("caseForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const statusMsg = document.getElementById("statusMsg");
  statusMsg.innerText = "Uploading... ⏳";

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  const file = document.getElementById("imageInput").files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function() {
      const base64 = reader.result.split(",")[1];

      data.image = base64;
      data.imageType = file.type;

      sendData(data);
    };

    reader.readAsDataURL(file);
  } else {
    sendData(data);
  }
});

function sendData(data) {
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    document.getElementById("statusMsg").innerText = "✅ Case Saved Successfully";
    document.getElementById("caseForm").reset();
  })
  .catch(err => {
    document.getElementById("statusMsg").innerText = "❌ Error: " + err;
  });
}
</script>

</body>
</html>
