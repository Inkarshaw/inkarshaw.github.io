<!DOCTYPE html>
<html>
<head>
  <title>Police Case Entry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    form {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #2c3e50;
      color: white;
      padding: 12px;
      border: none;
      width: 100%;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #34495e;
    }
  </style>
</head>

<body>

<h2>🚔 Police Case Entry</h2>

<form 
  action="https://script.google.com/macros/s/AKfycbwesHKAF5m6yJl6KQXRAs8JdCCK6LTOf_bP3ENMjITCuPL0WNwxxwfESm_OaOA_whX5/exec"
  method="POST">

  <!-- TEXT FIELDS -->
  <input name="fircsr" placeholder="FIR / CSR" required>
  <input name="station" placeholder="Station">
  <input name="number" placeholder="Case Number">
  <input name="year" placeholder="Year">
  <input name="sections" placeholder="Sections">

  <label>Date of Occurrence (DO)</label>
  <input type="date" name="do">

  <label>Date of Report (DR)</label>
  <input type="date" name="dr">

  <input name="complainant" placeholder="Complainant">
  <input name="accused" placeholder="Accused">

  <textarea name="contents" placeholder="FIR Contents"></textarea>

  <button type="submit">Submit Case</button>

</form>

</body>
</html>
